name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release metadata
        id: meta
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [[ -z "$TAG" ]]; then
            echo "Unable to resolve release tag from GITHUB_REF_NAME"
            exit 1
          fi

          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Tag must match v<major>.<minor>.<patch>, got: $TAG"
            exit 1
          fi

          VERSION="${TAG#v}"
          PROP_VERSION="$(awk -F= '/^version=/{print $2}' gradle.properties)"
          if [[ "$VERSION" != "$PROP_VERSION" ]]; then
            echo "Version mismatch: tag=$VERSION gradle.properties=$PROP_VERSION"
            exit 1
          fi

          TAG_COMMIT="$(git rev-parse "${TAG}^{commit}")"
          if [[ -z "$TAG_COMMIT" ]]; then
            echo "Unable to resolve commit for tag: $TAG"
            exit 1
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag_commit=$TAG_COMMIT" >> "$GITHUB_OUTPUT"

      - name: Verify tag commit is on main
        run: |
          git fetch --no-tags origin main
          if ! git merge-base --is-ancestor "${{ steps.meta.outputs.tag_commit }}" "origin/main"; then
            echo "Release tags must point to a commit reachable from origin/main"
            exit 1
          fi

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build and verify release candidate
        run: |
          chmod +x ./gradlew
          ./gradlew clean test integrationTest ktlintCheck shadowJar --no-daemon --stacktrace

      - name: Prepare release assets
        id: assets
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          RELEASE_DIR="build/release"
          JAR_NAME="burp-awesome-mcp-${VERSION}.jar"
          mkdir -p "$RELEASE_DIR"

          cp "build/libs/burp-awesome-mcp.jar" "$RELEASE_DIR/$JAR_NAME"
          cp "SKILL.md" "$RELEASE_DIR/SKILL.md"
          cp "AGENTS.md" "$RELEASE_DIR/AGENTS.md"
          echo "jar_path=$RELEASE_DIR/$JAR_NAME" >> "$GITHUB_OUTPUT"
          echo "skill_path=$RELEASE_DIR/SKILL.md" >> "$GITHUB_OUTPUT"
          echo "agents_path=$RELEASE_DIR/AGENTS.md" >> "$GITHUB_OUTPUT"

      - name: Sign release assets
        env:
          RELEASE_SIGNING_PRIVATE_KEY: ${{ secrets.RELEASE_SIGNING_PRIVATE_KEY }}
        run: |
          if [[ -z "${RELEASE_SIGNING_PRIVATE_KEY:-}" ]]; then
            echo "Missing required secret: RELEASE_SIGNING_PRIVATE_KEY"
            exit 1
          fi

          KEY_FILE="$RUNNER_TEMP/release_signing_key.pem"
          printf '%s' "$RELEASE_SIGNING_PRIVATE_KEY" > "$KEY_FILE"

          openssl pkeyutl -sign -inkey "$KEY_FILE" -rawin \
            -in "${{ steps.assets.outputs.jar_path }}" \
            -out "${{ steps.assets.outputs.jar_path }}.sig"

          openssl pkeyutl -sign -inkey "$KEY_FILE" -rawin \
            -in "${{ steps.assets.outputs.skill_path }}" \
            -out "${{ steps.assets.outputs.skill_path }}.sig"

          openssl pkeyutl -sign -inkey "$KEY_FILE" -rawin \
            -in "${{ steps.assets.outputs.agents_path }}" \
            -out "${{ steps.assets.outputs.agents_path }}.sig"

          rm -f "$KEY_FILE"

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: awesome-mcp-release-${{ steps.meta.outputs.version }}
          if-no-files-found: error
          path: |
            build/release/*

      - name: Create immutable release
        uses: caido/action-release@v1
        with:
          tag: ${{ steps.meta.outputs.tag }}
          commit: ${{ steps.meta.outputs.tag_commit }}
          body: Awesome MCP release ${{ steps.meta.outputs.version }}
          artifacts: ${{ steps.assets.outputs.jar_path }},${{ steps.assets.outputs.skill_path }},${{ steps.assets.outputs.agents_path }},${{ steps.assets.outputs.jar_path }}.sig,${{ steps.assets.outputs.skill_path }}.sig,${{ steps.assets.outputs.agents_path }}.sig
          allowUpdates: true
          replacesArtifacts: true
          artifactErrorsFailBuild: true
          immutableCreate: true
